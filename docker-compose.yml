version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: event_management
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - event_management:/var/lib/postgresql/data

volumes:
  event_management:
